<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Native-Search Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <h1>Native-Search Dashboard</h1>

      <section>
        <h2>Start Indexing</h2>
        <form id="index-form">
          <label>
            Origin URL
            <input id="origin" type="url" required placeholder="https://example.org" />
          </label>
          <label>
            Depth (k)
            <input id="depth" type="number" min="0" value="1" required />
          </label>
          <button type="submit">Start /index</button>
        </form>
        <p id="index-result"></p>
      </section>

      <section>
        <h2>Search</h2>
        <form id="search-form">
          <label>
            Query
            <input id="query" type="text" required />
          </label>
          <button type="submit">Run /search</button>
        </form>
        <ul id="search-results"></ul>
      </section>

      <section>
        <h2>System Status</h2>
        <div class="row">
          <button id="pause-btn">Pause</button>
          <button id="resume-btn">Resume</button>
        </div>
        <pre id="status"></pre>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
  </html>
